# Real-Life 03 — Football Match (BASELINE: with injury at minute 30)
#
# Proof-of-concept showing that LogCraft can emulate ANY distributed,
# event-driven system — here, a 90-minute football match — and that the
# same seeded run is bit-for-bit reproducible.
#
# This file is the BASELINE half of a two-file what-if pair:
#   * football_match_with_injury.yaml     ← THIS FILE (red star is hurt @ 30')
#   * football_match_without_injury.yaml  ← counterfactual (red plays full 90')
# Run both with the same seed and compare timelines to demonstrate
# deterministic causal replay.
#
# Domain mapping
#   * Each "team" is a LogCraft agent (the two clubs).
#   * Each emitted log record is a match event:
#         PASS / SHOT / GOAL / FOUL / INJURY.
#   * The match clock is the scenario clock — `1s wall = 1 simulated minute`.
#   * The "force injury at minute 30" is encoded as a 2-phase agent on
#     team-red:
#         phase #1 "first_half"     → minutes  0..30, full strength
#         phase #2 "injured_period" → minutes 30..90, reduced rate
#                                     (less possession ⇒ fewer shots ⇒ fewer goals)
#
# Scoring realism
#   GOAL has weight 1 out of 100, so each shot-volume window produces a
#   handful of goals (typically < 5 per team) — close to a real match.
#
# Concepts demonstrated: seed, phases (rate change), deterministic replay.
scenario:
  name: football-match-with-injury
  seed: 42
  duration: 90      # 90 "minutes" of match time (1s wall = 1 simulated minute)

  agents:
    # ── Team RED (the side that suffers the injury) ───────────────────────
    - name: team-red
      type: football_team
      rate: 5/s
      message_template: "team=red event={event} player={player} zone={zone}"
      phases:
        - name: first_half
          duration: 30s            # minutes 0..30 — full strength
          rate: 5/s
        - name: injured_period
          duration: 60s            # minutes 30..90 — star striker is down
          rate: 1.5/s              # less possession ⇒ fewer shots ⇒ fewer goals
      fields:
        - name: event
          generator: weighted_choice
          values: [PASS, SHOT, GOAL, FOUL, INJURY]
          weights: [80, 12, 1, 6, 1]   # GOAL ≈ 1% ⇒ realistic match score
        - name: player
          generator: choice
          values: [r-1, r-2, r-3, r-4, r-5, r-6, r-7, r-8, r-9, r-10, r-11]
        - name: zone
          generator: weighted_choice
          values: [defense, midfield, attack]
          weights: [30, 45, 25]

    # ── Team BLUE (constant strength — control group) ─────────────────────
    - name: team-blue
      type: football_team
      rate: 5/s
      message_template: "team=blue event={event} player={player} zone={zone}"
      fields:
        - name: event
          generator: weighted_choice
          values: [PASS, SHOT, GOAL, FOUL, INJURY]
          weights: [80, 12, 1, 6, 1]
        - name: player
          generator: choice
          values: [b-1, b-2, b-3, b-4, b-5, b-6, b-7, b-8, b-9, b-10, b-11]
        - name: zone
          generator: weighted_choice
          values: [defense, midfield, attack]
          weights: [30, 45, 25]

  outputs:
    - type: http
      url: http://ingest.logcraft.demo/v1/logs
      format: json
