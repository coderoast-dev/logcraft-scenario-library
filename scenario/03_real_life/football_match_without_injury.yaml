# Real-Life 03 — Football Match (WHAT-IF: no injury, red plays full 90')
#
# Counterfactual companion to football_match_with_injury.yaml.
# Identical seed, identical fields, identical generators — the ONLY
# difference is that team-red has no "injured_period" phase, so the
# star striker plays the full 90 minutes at full strength.
#
# Run both files with the same seed and compare the per-agent timelines:
#   * the SHARED PREFIX must be identical (no hidden global state),
#   * team-red plays MORE events end-to-end (full strength),
#   * team-blue (control group) is bit-for-bit identical.
#
# Concepts demonstrated: seed, deterministic replay, causal what-if.
scenario:
  name: football-match-without-injury
  seed: 42
  duration: 90      # 90 "minutes" of match time (1s wall = 1 simulated minute)

  agents:
    # ── Team RED (full strength for the entire 90 minutes) ────────────────
    - name: team-red
      type: football_team
      rate: 5/s     # no phases ⇒ flat 5/s for the entire match
      message_template: "team=red event={event} player={player} zone={zone}"
      fields:
        - name: event
          generator: weighted_choice
          values: [PASS, SHOT, GOAL, FOUL, INJURY]
          weights: [80, 12, 1, 6, 1]   # GOAL ≈ 1% ⇒ realistic match score
        - name: player
          generator: choice
          values: [r-1, r-2, r-3, r-4, r-5, r-6, r-7, r-8, r-9, r-10, r-11]
        - name: zone
          generator: weighted_choice
          values: [defense, midfield, attack]
          weights: [30, 45, 25]

    # ── Team BLUE (constant strength — control group) ─────────────────────
    - name: team-blue
      type: football_team
      rate: 5/s
      message_template: "team=blue event={event} player={player} zone={zone}"
      fields:
        - name: event
          generator: weighted_choice
          values: [PASS, SHOT, GOAL, FOUL, INJURY]
          weights: [80, 12, 1, 6, 1]
        - name: player
          generator: choice
          values: [b-1, b-2, b-3, b-4, b-5, b-6, b-7, b-8, b-9, b-10, b-11]
        - name: zone
          generator: weighted_choice
          values: [defense, midfield, attack]
          weights: [30, 45, 25]

  outputs:
    - type: console
      format: json
