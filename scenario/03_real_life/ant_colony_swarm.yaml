# Real-Life 06 — Ant Colony / Swarm (pure emergence)
#
# Scenario: 10 scout ants, 30 worker ants, 3 pheromone trails and 1 queen.
# Each ant is a TINY agent with simple local rules — no global controller,
# no central planner. Two timed incidents (path blocked, food depleted)
# disrupt the trails and you SEE the colony reorganise itself in the logs.
#
# This scenario is small in code but visually striking: 40+ agents emit
# events in parallel, dependencies model the trails, and auto-cascade
# propagates a blocked path back to the workers and finally to the queen.
#
# Concepts demonstrated: instances at swarm scale, interactions,
#                        auto_cascade, low-rate emergence.
scenario:
  name: ant-colony-swarm
  seed: 1729
  duration: 6m

  auto_cascade:
    error_threshold: 0.08
    dampening_factor: 0.7
    blast_radius: 3

  interactions:
    - from: scout-ant
      to: trail
      type: dependency
    - from: worker-ant
      to: trail
      type: dependency
    - from: trail
      to: queen
      type: dependency

  incidents:
    - name: path_blocked
      trigger: "time > 90s"
      duration: 90s
      effects:
        - target: trail
          latency_multiplier: 6
          error_rate: 0.25
        - target: worker-ant
          latency_multiplier: 2
          error_rate: 0.08
    - name: food_source_depleted
      trigger: "time > 4m"
      duration: 60s
      effects:
        - target: scout-ant
          latency_multiplier: 3
          error_rate: 0.20
        - target: worker-ant
          latency_multiplier: 2
          error_rate: 0.12

  agents:
    # ── Scout ants (10 explorers) ─────────────────────────────────────────
    - name: scout-ant
      type: agent
      rate: 2/s
      instances: 10
      error_rate: 0.01
      message_template: "scout {ant_id} {behavior} sector={sector}"
      fields:
        - name: ant_id
          generator: sequence
          prefix: "S-"
          start: 1
        - name: behavior
          generator: weighted_choice
          values: [EXPLORE, FIND_FOOD, RETURN, DROP_PHEROMONE, OBSTACLE, LOST]
          weights: [50, 15, 15, 10, 8, 2]
        - name: sector
          generator: choice
          values: [N, NE, E, SE, S, SW, W, NW]

    # ── Worker ants (30 carriers, follow trails) ──────────────────────────
    - name: worker-ant
      type: agent
      rate: 4/s
      instances: 30
      error_rate: 0.01
      dependencies: [trail]
      message_template: "worker {ant_id} {behavior} carrying={load}mg"
      fields:
        - name: ant_id
          generator: sequence
          prefix: "W-"
          start: 1
        - name: behavior
          generator: weighted_choice
          values: [FOLLOW_TRAIL, CARRY_FOOD, RETURN_NEST, REINFORCE_PHEROMONE,
                   IDLE, DETOUR, LOST]
          weights: [40, 25, 15, 10, 5, 4, 1]
        - name: load
          generator: range
          min: 0
          max: 50
          integer: true

    # ── Pheromone trails (the shared infrastructure) ──────────────────────
    - name: trail
      type: medium
      rate: 1/s
      instances: 3
      message_template: "trail {trail_id} strength={strength} state={state}"
      fields:
        - name: trail_id
          generator: choice
          values: [trail-alpha, trail-beta, trail-gamma]
        - name: strength
          generator: range
          min: 0
          max: 100
          integer: true
        - name: state
          generator: weighted_choice
          values: [STRONG, FADING, BROKEN, NEW]
          weights: [55, 25, 10, 10]

    # ── Queen (one, the apex of the chain) ────────────────────────────────
    - name: queen
      type: agent
      rate: 0.2/s
      dependencies: [trail]
      message_template: "queen: colony_health={health} eggs/min={egg_rate}"
      fields:
        - name: health
          generator: weighted_choice
          values: [thriving, stable, stressed, starving]
          weights: [55, 30, 12, 3]
        - name: egg_rate
          generator: range
          min: 0
          max: 30
          integer: true

  outputs:
    - type: http
      url: http://ingest.logcraft.demo/v1/logs
      format: json
