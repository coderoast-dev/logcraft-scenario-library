# Real-Life 05 — Robotic Factory Floor (cascading failures on the line)
#
# Scenario: a small assembly line with 8 robotic arms, 4 conveyor belts,
# 3 work zones, and 1 supervisor PLC. Robots feed conveyors, conveyors
# feed zones, zones report to the supervisor. Three timed incidents
# (arm fault, belt jam, peak-hour overload) cascade up the chain and let
# you watch a real industrial outage emerge in the logs.
#
# Concepts demonstrated: instances, interactions, auto_cascade,
#                        timed incidents, business-hours-style phases.
scenario:
  name: robotic-factory
  seed: 11
  duration: 8m

  auto_cascade:
    error_threshold: 0.06
    dampening_factor: 0.5
    blast_radius: 3

  interactions:
    - from: robot-arm
      to: conveyor
      type: dependency
    - from: conveyor
      to: work-zone
      type: dependency
    - from: work-zone
      to: supervisor
      type: dependency

  incidents:
    - name: arm_motor_fault
      trigger: "time > 2m"
      duration: 90s
      effects:
        - target: robot-arm
          latency_multiplier: 5
          error_rate: 0.20
    - name: conveyor_jam
      trigger: "time > 4m"
      duration: 90s
      effects:
        - target: conveyor
          latency_multiplier: 8
          error_rate: 0.30
        - target: work-zone
          latency_multiplier: 3
          error_rate: 0.10
    - name: peak_hour_overload
      trigger: "time > 6m"
      duration: 60s
      effects:
        - target: robot-arm
          latency_multiplier: 2
          error_rate: 0.08
        - target: conveyor
          latency_multiplier: 2
          error_rate: 0.10
        - target: work-zone
          latency_multiplier: 2
          error_rate: 0.15

  agents:
    # ── Robotic arms (the workforce) ──────────────────────────────────────
    - name: robot-arm
      type: actuator
      rate: 5/s
      instances: 8
      error_rate: 0.005
      latency_ms:
        distribution: normal
        mean: 18
        stddev: 6
      message_template: "arm {arm_id} {action} part {part_id} at {station}"
      fields:
        - name: arm_id
          generator: sequence
          prefix: "ARM-"
          start: 1
        - name: action
          generator: weighted_choice
          values: [PICK, PLACE, WELD, ASSEMBLE, INSPECT, IDLE, JAM, FAULT, EMERGENCY_STOP]
          weights: [25,   25,    10,   20,        10,      6,    2,   1,     1]
        - name: part_id
          generator: sequence
          prefix: "P-"
          start: 1000
        - name: station
          generator: choice
          values: [S1, S2, S3, S4, S5, S6]

    # ── Conveyor belts (the transport layer) ──────────────────────────────
    - name: conveyor
      type: transport
      rate: 8/s
      instances: 4
      dependencies: [robot-arm]
      message_template: "belt {belt_id} {state} speed={speed}m/s load={load}%"
      fields:
        - name: belt_id
          generator: sequence
          prefix: "CB-"
          start: 1
        - name: state
          generator: weighted_choice
          values: [RUNNING, SLOW, BLOCKED, STOPPED, MAINTENANCE]
          weights: [70, 15, 8, 5, 2]
        - name: speed
          generator: range
          min: 0.0
          max: 2.5
          integer: false
        - name: load
          generator: range
          min: 10
          max: 100
          integer: true

    # ── Work zones (where assembly happens) ───────────────────────────────
    - name: work-zone
      type: cell
      rate: 3/s
      instances: 3
      dependencies: [conveyor]
      message_template: "zone {zone_id} {status} throughput={throughput}/min"
      fields:
        - name: zone_id
          generator: choice
          values: [Z-WELD, Z-ASSY, Z-PACK]
        - name: status
          generator: weighted_choice
          values: [NOMINAL, DEGRADED, OVERLOADED, HALTED]
          weights: [70, 18, 10, 2]
        - name: throughput
          generator: range
          min: 5
          max: 60
          integer: true

    # ── Supervisor PLC (the top of the chain) ─────────────────────────────
    - name: supervisor
      type: controller
      rate: 1/s
      dependencies: [work-zone]
      message_template: "supervisor: line OEE={oee}% alert={alert}"
      fields:
        - name: oee
          generator: range
          min: 40
          max: 95
          integer: true
        - name: alert
          generator: weighted_choice
          values: [none, info, warning, critical]
          weights: [70, 15, 10, 5]

  outputs:
    - type: console
      format: json
