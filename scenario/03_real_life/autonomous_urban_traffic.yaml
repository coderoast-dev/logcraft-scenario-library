# Real-Life 04 — Autonomous Urban Traffic (emergent jams via cascades)
#
# Scenario: a small city block with ~30 self-driving cars, 8 intersections
# and 8 traffic lights. Cars depend on intersections; intersections depend
# on traffic lights. When a light fails or a car hard-brakes, LogCraft's
# auto-cascade engine NATURALLY propagates the disturbance upstream and
# you SEE traffic jams emerge in the logs.
#
# Why this is the killer LogCraft demo:
#   * 30+ independent agents producing events at once.
#   * Topology-aware error & latency cascade (car ← intersection ← light).
#   * Three timed incidents stack on top of each other to create
#     EMERGENT congestion that no single agent encodes explicitly.
#
# Concepts demonstrated: instances, interactions, auto_cascade,
#                        timed incidents, phases, weighted_choice.
scenario:
  name: autonomous-urban-traffic
  seed: 7
  duration: 8m

  templates:
    moving_object:
      rate: 4/s
      error_rate: 0.005
      latency_ms:
        distribution: normal
        mean: 12
        stddev: 4

  # When error rate on traffic-light goes up, intersections (1 hop) and then
  # cars (2 hops) feel it — exactly the way real traffic propagates upstream.
  auto_cascade:
    error_threshold: 0.05
    dampening_factor: 0.6
    blast_radius: 2

  interactions:
    - from: car
      to: intersection
      type: dependency
    - from: intersection
      to: traffic-light
      type: dependency

  # Three timed disturbances. They overlap on purpose: the second incident
  # fires while the first is still active, which is what produces the
  # *emergent* jam pattern in the logs.
  incidents:
    - name: hard_brake_wave
      trigger: "time > 2m"
      duration: 60s
      effects:
        - target: car
          latency_multiplier: 4
          error_rate: 0.10
    - name: minor_collision
      trigger: "time > 4m"
      duration: 90s
      effects:
        - target: car
          latency_multiplier: 6
          error_rate: 0.18
        - target: intersection
          latency_multiplier: 3
          error_rate: 0.08
    - name: traffic_light_failure
      trigger: "time > 6m"
      duration: 90s
      effects:
        - target: traffic-light
          latency_multiplier: 10
          error_rate: 0.40
        - target: intersection
          latency_multiplier: 2
          error_rate: 0.12

  agents:
    # ── Cars (the swarm) ──────────────────────────────────────────────────
    - name: car
      type: vehicle
      use: moving_object
      instances: 30                 # 30 autonomous cars driving in parallel
      message_template: "car {car_id} {event} at {street} ({zone})"
      fields:
        - name: car_id
          generator: sequence
          prefix: "av-"
          start: 1
        - name: event
          generator: weighted_choice
          values: [ACCELERATE, BRAKE, HARD_BRAKE, STOP, GO, LANE_CHANGE, COLLISION,
                   TRAFFIC_JAM, RED_LIGHT_RUN]
          weights:  [25,         18,    8,          15,   18, 10,         1,
                     4,           1]
        - name: street
          generator: choice
          values: [main_st, oak_ave, 5th_ave, broadway, river_rd, market_st, pine_st, elm_st]
        - name: zone
          generator: weighted_choice
          values: [downtown, residential, industrial, highway]
          weights: [40, 30, 20, 10]

    # ── Intersections (the bottlenecks) ───────────────────────────────────
    - name: intersection
      type: junction
      rate: 6/s
      instances: 8
      dependencies: [traffic-light]
      message_template: "intersection {junction_id} {state} ({queued} queued)"
      fields:
        - name: junction_id
          generator: sequence
          prefix: "X-"
          start: 1
        - name: state
          generator: weighted_choice
          values: [CLEAR, BUSY, CONGESTED, GRIDLOCK]
          weights: [55, 30, 12, 3]
        - name: queued
          generator: range
          min: 0
          max: 25
          integer: true

    # ── Traffic lights (the failure source) ───────────────────────────────
    - name: traffic-light
      type: signal
      rate: 2/s
      instances: 8
      message_template: "light {light_id} -> {phase}"
      fields:
        - name: light_id
          generator: sequence
          prefix: "TL-"
          start: 1
        - name: phase
          generator: weighted_choice
          values: [GREEN, YELLOW, RED, FLASHING_AMBER, OUT_OF_ORDER]
          weights: [45, 8, 45, 1, 1]

  outputs:
    - type: http
      url: http://ingest.logcraft.demo/v1/logs
      format: json
