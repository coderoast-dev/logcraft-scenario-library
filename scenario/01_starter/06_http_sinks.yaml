# Starter 06 — Multiple HTTP Sinks
# Same logs routed to three HTTP endpoints simultaneously, each in a different format.
# Concepts: http sink, multiple outputs, format per sink, backlog, error tracking
scenario:
  name: http-sinks
  duration: 2m

  outputs:
    - name: log-aggregator
      type: http
      url: http://ingest.logcraft.demo/v1/logs
      format: json
    - name: alert-webhook
      type: http
      url: http://alerts.logcraft.demo/webhooks/logs
      format: ecs
    - name: siem-backend
      type: http
      url: http://siem.logcraft.demo/api/bulk
      format: kv

  agents:
    - name: api-gateway
      type: web_server
      rate: 5/s
      error_rate: 0.04
      message_template: "{method} {path} -> {status_code}"
      fields:
        - name: method
          generator: weighted_choice
          values: [GET, POST, PUT, DELETE]
          weights: [60, 25, 10, 5]
        - name: path
          generator: choice
          values: [/api/users, /api/orders, /api/products, /health]
        - name: status_code
          generator: weighted_choice
          values: ["200", "201", "404", "500"]
          weights: [80, 10, 7, 3]
        - name: bytes_sent
          generator: range
          min: 200
          max: 50000
          integer: true
